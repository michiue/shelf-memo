const LS_KEY = "sm_pass";
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function tryDecrypt(pass) {
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass),
    "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: b64(SALT), iterations: ITER, hash: "SHA-256" },
    km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
  const plain = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: b64(IV) }, key, b64(DATA));
  return new TextDecoder().decode(plain);
}

function render(html) {
  document.open();
  document.write(html);
  document.close();
}

const form = document.getElementById("f");
form.addEventListener("submit", async e => {
  e.preventDefault();
  const pass = document.getElementById("p").value;
  document.getElementById("msg").textContent = "確認中…";
  try {
    const html = await tryDecrypt(pass);
    localStorage.setItem(LS_KEY, pass);
    render(html);
  } catch {
    document.getElementById("msg").textContent = "合言葉が違います";
  }
});

(async () => {
  const saved = localStorage.getItem(LS_KEY);
  if (saved) {
    try { render(await tryDecrypt(saved)); return; }
    catch { localStorage.removeItem(LS_KEY); }
  }
  form.style.display = "";
})();
})();
</script>
